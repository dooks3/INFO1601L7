<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7</title>

    <style>
        *{
            box-sizing: border-box;
        }
        body{
            display: flex;
            padding: 0;
            background-color: gainsboro;
            flex-direction: column;
            margin: 0;
            gap: 10px;
        }
        nav{
            display: flex;
            flex-grow: 1;
            background-color: blue;
            color: white;
            font-family: monospace;
            font-size: 25px;
            font-weight: bold;
            box-shadow: 0px 10px 5px 0px rgba(0,0,0,0.31);
        }

        main{
            margin-right: auto;
            margin-left: auto;
            width: 95vw;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-grow: 10;
        }

        section{
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
        .card{
            border-radius: 2px;
            background-color: white;
            font-size: 0.7em;
            padding: 8px;
            border: 1px solid gainsboro;
            box-shadow: -11px 9px 5px -4px rgba(0,0,0,0.31);
        }

        table{
            border-collapse: collapse;
        }
        thead,th{
            background-color: blue;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
        }
        td{
            font-size: 1.5em;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }
        tr:hover{
            background-color: #ddd;
        }
        table img{
            height: 100px;
        }
    </style>
</head>
<body>
    <nav>
        Amiibo App
    </nav>

    <main>
        <section id="controls" class="card">
        </section>

        <section id="table" class="card">
            <table class="card">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Series</th>
                        <th>Image</th>
                        <th>Release</th>
                    </tr>
                </thead>
                <tbody id="result">
                    <tr>
                        <td>Sandy</td>
                        <td>Animal Crossing</td>
                        <td><img src="https://raw.githubusercontent.com/N3evin/AmiiboAPI/master/images/icon_04380001-03000502.png"></td>
                        <td>
                            <ul>
                                <li> Date 1</li>
                                <li>Date 2</li>
                            </ul>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>

    </script>
</body>
</html>
