<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7</title>

    <style>
        *{
            box-sizing: border-box;
        }
        body{
            display: flex;
            padding: 0;
            background-color: gainsboro;
            flex-direction: column;
            margin: 0;
            gap: 10px;
        }
        nav{
            display: flex;
            flex-grow: 1;
            background-color: blue;
            color: white;
            font-family: monospace;
            font-size: 25px;
            font-weight: bold;
            box-shadow: 0px 10px 5px 0px rgba(0,0,0,0.31);
        }

        main{
            margin-right: auto;
            margin-left: auto;
            width: 95vw;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-grow: 10;
        }

        section{
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
        .card{
            border-radius: 2px;
            background-color: white;
            font-size: 0.7em;
            padding: 8px;
            border: 1px solid gainsboro;
            box-shadow: -11px 9px 5px -4px rgba(0,0,0,0.31);
        }

        table{
            border-collapse: collapse;
            width: 100%;
        }
        thead,th{
            background-color: blue;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
        }
        
        td{
            font-size: 1.5em;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }
        tr:hover{
            background-color: #ddd;
        }
        table img{
            height: 100px;
        }
        button{
            border-radius: 5px;
            padding: 5px;
            border: 1px solid grey;
        }
        button:hover{
            background-color: white;
        }

        article{
            display: flex;
            flex-direction: row;
        }

        aside{
            display: flex;
            flex-direction: column;
            flex-grow: 2;
            flex: 1;
            background-color: white;
        }

        .scrollable{
            overflow-y: scroll;
            display: flex;
            flex: 3;
            max-height: 80vh;
            flex-grow: 4;
        }


    </style>
</head>
<body>
    <nav>
        Amiibo App
    </nav>

    <main>
        <section class="card">
            <button onclick="filterBySeries('Animal Crossing')">Animal Crossing</button>
            <button onclick="filterBySeries('The Legend of Zelda')">The Legend of Zelda</button>
            <button onclick="filterBySeries('Super Mario')">Super Mario</button>
            <input type="search" id="searchKey" placeholder="Search Name">
            <button onclick="search()">Search</button>
        </section>

        <article>
            <div class="scrollable">
                <table class="card">
                    <thead>
                        <tr>
                            <th>Name <button onclick="sortByName()">Sort</button></th>
                            <th>Series</th>
                            <th>Image</th>
                            <th>Release</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="result">
                        
                    </tbody>
                </table>
            </div>

            <aside>
                <h1>Supported Games for <span id="character"></span></h1>
                <ul id="games"></ul>
            </aside>
        </article>


    </main>

    <script>

        function drawTable(records){

            let html='';
            let result = document.querySelector('#result');

            let count = 0;
            
            for(let rec of records){
                html+=`<tr>
                <td>${rec.character}</td>
                <td>${rec.gameSeries}</td>
                <td>
                    <img src="${rec.image}">
                </td>
                <td>
                    ${rec.release.na}
                </td>
                <td>
                    <button onclick="viewDetails('${rec.head}',${rec.tail})">View Details</button>
                </td>
            </tr>`;
                count++;
                if (count > 100) break;
            }

            result.innerHTML = html;
        }

        let state = [];

        async function getData(){
            const response = await fetch('https://weblabs.web.app/data/amiibo.json');
            const data = await response.json();
            return data.amiibo.slice(0, 100);//gets first 100 items (too much data)
        }

    async function showAllGames(){
        state = await getData();
        drawTable(state);
    }

    

    function filterBySeries(series){
        let filtered = [];
        
        //iterate the records in the global state
        for(let rec of state){
            
            //push only elements that match the given series
            if (rec.gameSeries === series)
            filtered.push(rec);
        }
        drawTable(filtered);
    }

    function search(){
        //get the search term from the input field
        let searchKey = document.querySelector('#searchKey').value;
        
        let results = [];
        
        //iterate all the records in the global state
        for(let rec of state){
        
            //capitalize the search term and text to be case insensitive
            let searchText = rec.character.toUpperCase();
            searchKey = searchKey.toUpperCase();
        
            //add to resulting array if search term is in the text
            if ( searchText.search(searchKey) !== -1 ){
            results.push(rec);
            }
        }
        //draw table with the search results
        drawTable(results);
    }

    function nameCompare(a, b){
        return a.character.localeCompare(b.character);
    }

    function sortByName(){
        let result = state.sort(nameCompare);
        drawTable(result);
    }

    function getRecord(head,tail){
        for(let item of state){
            if(item.head === head && item.tail === tail){
                return item; 
            }
        }
    }

    function viewDetails(head,tail){
        let record = getRecord(head,tail); 

        let character = document.querySelector('#character');
        let result = document.querySelector('#games'); 
        
        let html = ''; 

        for(let game of record.gamesSwitch){
            html+=`<li>${game.gameName}</li>`;
        }
        character.innerHTML = record.character; 
        result.innerHTML = html; 
    }

    showAllGames();
    </script>
</body>
</html>
